<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descubrí Ancasti - Turismo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#f5f0eb}
        .hero{height:60vh;background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1600&q=80");background-size:cover;background-position:center;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;padding:20px}
        .hero h1{font-size:4.5rem;font-weight:800;text-shadow:2px 2px 10px rgba(0,0,0,0.7);letter-spacing:2px}
        .hero p{font-size:1.6rem;font-weight:300;text-shadow:2px 2px 8px rgba(0,0,0,0.7);margin-top:10px}
        .btn-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:25px;max-width:900px;margin:50px auto;padding:0 20px}
        .btn-grande{background:#fff;border:none;border-radius:20px;padding:40px 20px;font-size:1.3rem;font-weight:600;color:#2d3e4f;box-shadow:0 8px 25px rgba(0,0,0,0.10);transition:transform 0.2s,box-shadow 0.2s;cursor:pointer;text-align:center;text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:12px}
        .btn-grande:hover{transform:translateY(-6px);box-shadow:0 14px 35px rgba(0,0,0,0.18);background:#faf8f6}
        .btn-grande .icono{font-size:3.5rem}
        .footer{text-align:center;padding:30px;color:#6c7a89;font-size:.95rem;border-top:1px solid #ddd;background:#fff}
        @media(max-width:600px){.hero h1{font-size:2.8rem}.hero p{font-size:1.2rem}.btn-grande{padding:30px 15px;font-size:1.1rem}.btn-grande .icono{font-size:2.8rem}}
    </style>
</head>
<body>
    <section class="hero">
        <h1>🌄 DESCUBRÍ ANCASTI</h1>
        <p>Naturaleza, historia y aventura en el corazón de Catamarca.</p>
    </section>
    <div class="btn-grid">
        <a href="#" class="btn-grande"><span class="icono">🏛</span>Lugares</a>
        <a href="#" class="btn-grande"><span class="icono">🛏</span>Hospedajes</a>
        <a href="#" class="btn-grande"><span class="icono">🍽</span>Gastronomía</a>
        <a href="#" class="btn-grande"><span class="icono">📅</span>Eventos</a>
        <a href="#" class="btn-grande"><span class="icono">📍</span>Cómo llegar</a>
    </div>
    <div class="footer"><p>📍 Ancasti, Catamarca · Argentina</p></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
